<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8f7f2"/>
  <text x="60" y="70" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#1f2933">Reward Function and Episode Outcomes</text>

  <rect x="60" y="120" width="1080" height="120" rx="18" ry="18" fill="#ffffff" stroke="#1f2933" stroke-width="2.5"/>
  <text x="95" y="175" font-family="Courier New, monospace" font-size="28" fill="#1f2933">Total Return = sum(step rewards over the episode)</text>
  <text x="95" y="215" font-family="Courier New, monospace" font-size="24" fill="#1f2933">Goal: +1.0   Collision: -1.0   Normal step: -0.01   Timeout: -0.5</text>

  <rect x="60" y="290" width="320" height="250" rx="18" ry="18" fill="#dff6e5" stroke="#2b7a46" stroke-width="2.5"/>
  <text x="220" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#1f4d2d">Successful episode</text>
  <text x="90" y="390" font-family="Georgia, serif" font-size="20" fill="#1f4d2d">Example: reach goal in 8 moves</text>
  <text x="90" y="430" font-family="Courier New, monospace" font-size="20" fill="#1f4d2d">Return = 7 x (-0.01) + 1.0</text>
  <text x="90" y="470" font-family="Courier New, monospace" font-size="20" fill="#1f4d2d">Return = -0.07 + 1.0 = 0.93</text>
  <text x="90" y="510" font-family="Georgia, serif" font-size="20" fill="#1f4d2d">High return means short, safe success.</text>

  <rect x="440" y="290" width="320" height="250" rx="18" ry="18" fill="#fde3dd" stroke="#b23b2d" stroke-width="2.5"/>
  <text x="600" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#6b2018">Collision failure</text>
  <text x="470" y="390" font-family="Georgia, serif" font-size="20" fill="#6b2018">Example: 3 safe steps, then hit wall</text>
  <text x="470" y="430" font-family="Courier New, monospace" font-size="20" fill="#6b2018">Return = 3 x (-0.01) + (-1.0)</text>
  <text x="470" y="470" font-family="Courier New, monospace" font-size="20" fill="#6b2018">Return = -0.03 - 1.0 = -1.03</text>
  <text x="470" y="510" font-family="Georgia, serif" font-size="20" fill="#6b2018">Large penalty discourages unsafe actions.</text>

  <rect x="820" y="290" width="320" height="250" rx="18" ry="18" fill="#fff2cf" stroke="#a67c00" stroke-width="2.5"/>
  <text x="980" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#5f4700">Timeout failure</text>
  <text x="850" y="390" font-family="Georgia, serif" font-size="20" fill="#5f4700">Example: wandering until max_steps</text>
  <text x="850" y="430" font-family="Courier New, monospace" font-size="20" fill="#5f4700">Return = 49 x (-0.01) + (-0.5)</text>
  <text x="850" y="470" font-family="Courier New, monospace" font-size="20" fill="#5f4700">Return = -0.49 - 0.5 = -0.99</text>
  <text x="850" y="510" font-family="Georgia, serif" font-size="20" fill="#5f4700">Shows inefficient behavior without collision.</text>
</svg>
